<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FocusFlow — set goals, break them into milestones and tasks, and chat with your AI coach when you're stuck." />
    <meta name="theme-color" content="#10b981" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FocusFlow — your AI productivity coach" />
    <meta property="og:description" content="Set goals, get AI-generated plans, and chat with your personal coach when you're stuck." />
    <meta property="og:url" content="https://focus-flow-theta-henna.vercel.app/" />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:site_name" content="FocusFlow" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FocusFlow — your AI productivity coach" />
    <meta name="twitter:description" content="Set goals, get AI-generated plans, and chat with your personal coach when you're stuck." />
    <meta name="twitter:image" content="/logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <title>FocusFlow</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('focusflow.theme');
          var prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (saved !== 'light' && prefers)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
